name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ConnectUniWebapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ConnectUniWebapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cypress E2E
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_API_URL: ${{ secrets.VITE_API_URL }}
          CYPRESS_E2E_EMAIL: ${{ secrets.CYPRESS_E2E_EMAIL }}
          CYPRESS_E2E_PASSWORD: ${{ secrets.CYPRESS_E2E_PASSWORD }}
          CYPRESS_E2E_RUN_WRITES: false
        with:
          working-directory: ConnectUniWebapp
          install: false
          start: npm run preview -- --host 127.0.0.1 --port 5173
          wait-on: http://127.0.0.1:5173
          browser: chrome

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: ConnectUniWebapp/cypress/screenshots
          if-no-files-found: ignore
